name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate config.js from secrets
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_ANON: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "window.CONFIG = { SUPABASE_URL: \"${SB_URL}\", SUPABASE_ANON_KEY: \"${SB_ANON}\" };" > js/config.js

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
